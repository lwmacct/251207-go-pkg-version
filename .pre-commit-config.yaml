# Pre-commit hooks configuration
# See https://pre-commit.com for more information

# 全局配置
default_stages: [pre-commit]
fail_fast: true # 发现第一个错误即停止

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  # 本地自定义检查
  - repo: local
    hooks:
      - id: prettier
        name: Format docs and configs with Prettier
        entry: prettier --write --ignore-unknown --no-error-on-unmatched-pattern
        language: system
        stages: [pre-commit]

      - id: golangci-lint
        name: Run golangci-lint on new changes
        entry: golangci-lint run --new --fix
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: \.go$
